name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Web demos to publish, one directory each under the Pages site root (e.g.
  # kormium.github.io/playground/sql-demo/). Add a module name here once it ships a
  # wasmJsBrowserDistribution task, and add a matching entry to pages/index.html.
  DEMOS: "sql-demo"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Kotlin/Wasm production distribution — minified JS + wasm, no dev tooling.
      - name: Build each demo (production)
        run: |
          for demo in $DEMOS; do
            ./gradlew ":$demo:wasmJsBrowserDistribution" --console=plain
          done

      # One subdirectory per demo, so each gets its own stable URL, plus the landing page at the root.
      - name: Assemble site
        run: |
          mkdir -p _site
          cp pages/index.html _site/index.html
          for demo in $DEMOS; do
            mkdir -p "_site/$demo"
            cp -r "$demo/build/dist/wasmJs/productionExecutable/." "_site/$demo/"
          done

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
